<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robodog 3D — LiDAR Space Reconstruction</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #06060c; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; color: #ccc; }
canvas { display: block; }

#blocker {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(6,6,12,0.92);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
#blocker.hidden { display: none; }

#splash {
  text-align: center; max-width: 520px; padding: 40px;
}
#splash h1 {
  font-size: 28px; color: #7ae8b4; margin-bottom: 8px; letter-spacing: 2px;
}
#splash .sub { color: #888; font-size: 13px; margin-bottom: 30px; }
#splash .start-btn {
  display: inline-block; padding: 14px 36px; border: 1px solid #7ae8b4;
  color: #7ae8b4; font-size: 15px; cursor: pointer; border-radius: 4px;
  transition: all 0.2s; letter-spacing: 1px;
}
#splash .start-btn:hover { background: #7ae8b4; color: #06060c; }
#splash .controls-hint {
  margin-top: 24px; color: #666; font-size: 11px; line-height: 1.8;
}
#splash .controls-hint kbd {
  background: #222; padding: 2px 7px; border-radius: 3px; border: 1px solid #444;
  font-size: 11px; color: #aaa;
}

#hud {
  position: fixed; top: 12px; left: 12px; z-index: 10;
  font-size: 11px; color: #556; pointer-events: none;
  line-height: 1.6;
}
#hud .val { color: #7ae8b4; }

#toggle-bar {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; gap: 6px;
}
#toggle-bar button {
  padding: 8px 16px; font-size: 12px; font-family: inherit;
  background: rgba(20,20,30,0.8); border: 1px solid #333; color: #888;
  border-radius: 4px; cursor: pointer; transition: all 0.2s;
  backdrop-filter: blur(8px);
}
#toggle-bar button.active { border-color: #7ae8b4; color: #7ae8b4; }
#toggle-bar button:hover { border-color: #7ae8b4; color: #bbb; }

#crosshair {
  position: fixed; top: 50%; left: 50%; z-index: 10;
  width: 16px; height: 16px; transform: translate(-50%, -50%);
  pointer-events: none; opacity: 0.3;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: #7ae8b4;
}
#crosshair::before { width: 1px; height: 16px; left: 7.5px; top: 0; }
#crosshair::after { width: 16px; height: 1px; top: 7.5px; left: 0; }

#loading {
  position: fixed; inset: 0; z-index: 200;
  background: #06060c; display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
#loading.hidden { display: none; }
#loading h2 { color: #7ae8b4; font-size: 16px; margin-bottom: 16px; }
#loading .bar { width: 200px; height: 3px; background: #1a1a2a; border-radius: 2px; overflow: hidden; }
#loading .bar-fill { height: 100%; background: #7ae8b4; width: 0%; transition: width 0.3s; }
#loading .status { color: #556; font-size: 11px; margin-top: 10px; }

/* Mobile touch controls */
#touch-controls {
  display: none; position: fixed; bottom: 80px; z-index: 10;
}
@media (pointer: coarse) {
  #touch-controls { display: flex; gap: 8px; left: 16px; }
  #touch-controls button {
    width: 52px; height: 52px; border-radius: 50%; border: 1px solid #444;
    background: rgba(20,20,30,0.7); color: #7ae8b4; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
}
</style>
</head>
<body>

<div id="loading">
  <h2>🐕 ROBODOG 3D</h2>
  <div class="bar"><div class="bar-fill" id="load-bar"></div></div>
  <div class="status" id="load-status">Initializing...</div>
</div>

<div id="blocker" class="hidden">
  <div id="splash">
    <h1>🐕 ROBODOG 3D</h1>
    <div class="sub">LiDAR-reconstructed indoor space from a Unitree Go2 robot dog</div>
    <div class="start-btn" id="start-btn">ENTER SPACE</div>
    <div class="controls-hint">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;
      <kbd>Mouse</kbd> Look &nbsp;
      <kbd>Shift</kbd> Sprint<br>
      <kbd>1</kbd> Point Cloud &nbsp;
      <kbd>2</kbd> Model &nbsp;
      <kbd>3</kbd> Both &nbsp;
      <kbd>ESC</kbd> Menu
    </div>
  </div>
</div>

<div id="crosshair"></div>

<div id="hud">
  <div>POS <span class="val" id="hud-pos">0, 0, 0</span></div>
  <div>PTS <span class="val" id="hud-pts">-</span> &nbsp; TRIS <span class="val" id="hud-tris">-</span></div>
  <div>VIEW <span class="val" id="hud-mode">BOTH</span></div>
</div>

<div id="toggle-bar">
  <button id="btn-pc" title="Point Cloud (1)">☁ Points</button>
  <button id="btn-model" title="Model (2)">🏠 Model</button>
  <button id="btn-both" class="active" title="Both (3)">⚡ Both</button>
</div>

<div id="touch-controls">
  <button id="touch-fwd">▲</button>
  <button id="touch-left">◄</button>
  <button id="touch-back">▼</button>
  <button id="touch-right">►</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ---- Globals ----
let scene, camera, renderer, controls;
let modelGroup, pointCloudGroup, trajectoryLine;
let flashLight, flashTarget;
let clock = new THREE.Clock();
let viewMode = 'both'; // 'pc' | 'model' | 'both'

const moveState = { forward: false, backward: false, left: false, right: false, sprint: false };
const WALK_SPEED = 3.0;
const SPRINT_SPEED = 8.0;
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();

let totalPoints = 0;
let totalTris = 0;
let trajData = null;

// ---- Loading ----
const loadBar = document.getElementById('load-bar');
const loadStatus = document.getElementById('load-status');
function setProgress(pct, msg) {
  loadBar.style.width = pct + '%';
  if (msg) loadStatus.textContent = msg;
}

// ---- Init ----
async function init() {
  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x06060c);
  scene.fog = new THREE.FogExp2(0x06060c, 0.04);

  // Camera
  camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.05, 100);

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = false;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.body.appendChild(renderer.domElement);

  // Controls
  controls = new PointerLockControls(camera, document.body);

  // Ambient light
  const ambient = new THREE.AmbientLight(0x334455, 0.4);
  scene.add(ambient);

  // Hemisphere light
  const hemi = new THREE.HemisphereLight(0x8899aa, 0x222233, 0.3);
  scene.add(hemi);

  // Flashlight (SpotLight following camera)
  flashTarget = new THREE.Object3D();
  scene.add(flashTarget);
  flashLight = new THREE.SpotLight(0xffe8cc, 3.0, 20, Math.PI * 0.4, 0.4, 1.5);
  flashLight.castShadow = false;
  scene.add(flashLight);

  // Groups
  modelGroup = new THREE.Group();
  pointCloudGroup = new THREE.Group();
  scene.add(modelGroup);
  scene.add(pointCloudGroup);

  setProgress(10, 'Loading trajectory...');

  // Load trajectory
  try {
    const resp = await fetch('assets/trajectory.json');
    trajData = await resp.json();
    createTrajectory(trajData);
    setProgress(20, 'Loading point cloud...');
  } catch(e) {
    console.warn('Trajectory load failed:', e);
    setProgress(20, 'Loading point cloud...');
  }

  // Load point cloud
  try {
    const pcResp = await fetch('assets/pointcloud.bin');
    const pcBuf = await pcResp.arrayBuffer();
    createPointCloud(pcBuf);
    setProgress(50, 'Loading 3D model...');
  } catch(e) {
    console.warn('Point cloud load failed:', e);
    setProgress(50, 'Loading 3D model...');
  }

  // Load GLB model
  try {
    const loader = new GLTFLoader();
    const gltf = await new Promise((resolve, reject) => {
      loader.load('assets/model.glb', resolve, 
        (xhr) => {
          const pct = 50 + (xhr.loaded / xhr.total) * 40;
          setProgress(Math.min(90, pct), 'Loading 3D model...');
        }, reject);
    });
    processModel(gltf);
    setProgress(95, 'Finalizing...');
  } catch(e) {
    console.warn('Model load failed:', e);
  }

  // Set camera to robot start position
  if (trajData) {
    const s = trajData.start;
    camera.position.set(s[0], s[2] + 0.6, -s[1]); // swap Y/Z for Three.js
  } else {
    camera.position.set(1.5, 0.9, 4.0);
  }

  setProgress(100, 'Ready!');
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('blocker').classList.remove('hidden');
  }, 400);

  // Events
  setupEvents();

  // HUD
  updateHUD();

  // Render loop
  animate();
}

// ---- Create trajectory line ----
function createTrajectory(data) {
  const pts = data.points;
  const geom = new THREE.BufferGeometry();
  const positions = new Float32Array(pts.length * 3);
  for (let i = 0; i < pts.length; i++) {
    // MCAP coordinate system: X=forward, Y=left, Z=up
    // Three.js: X=right, Y=up, Z=toward camera
    // Mapping: three.x = mcap.x, three.y = mcap.z, three.z = -mcap.y
    positions[i*3]     = pts[i][0];
    positions[i*3 + 1] = pts[i][2] + 0.05; // slightly above floor
    positions[i*3 + 2] = -pts[i][1];
  }
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.LineBasicMaterial({ color: 0x4488ff, linewidth: 1, transparent: true, opacity: 0.5 });
  trajectoryLine = new THREE.Line(geom, mat);
  scene.add(trajectoryLine);
}

// ---- Create point cloud ----
function createPointCloud(buffer) {
  const view = new DataView(buffer);
  const count = view.getUint32(0, true);
  totalPoints = count;
  
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  
  let offset = 4;
  for (let i = 0; i < count; i++) {
    const x = view.getFloat32(offset, true); offset += 4;
    const y = view.getFloat32(offset + 4, true); // will be z
    const z = view.getFloat32(offset, true); offset += 4;
    const mcapY = view.getFloat32(offset, true); offset += 4;
    
    // Coordinate mapping
    positions[i*3]     = x;
    positions[i*3 + 1] = z;     // mcap.z → three.y (up)
    positions[i*3 + 2] = -mcapY; // mcap.y → three.z (negated)
    
    const r = view.getUint8(offset++) / 255;
    const g = view.getUint8(offset++) / 255;
    const b = view.getUint8(offset++) / 255;
    colors[i*3] = r;
    colors[i*3+1] = g;
    colors[i*3+2] = b;
  }
  
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  
  const mat = new THREE.PointsMaterial({
    size: 0.06,
    vertexColors: true,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.85,
  });
  
  const points = new THREE.Points(geom, mat);
  pointCloudGroup.add(points);
}

// ---- Process GLB model ----
function processModel(gltf) {
  const model = gltf.scene;
  
  // The model is in MCAP coordinates (X,Y,Z) = (forward, left, up)
  // Three.js uses (X, Y, Z) = (right, up, forward)
  // Rotation: -90° around X axis maps Y→Z and Z→Y
  model.rotation.x = -Math.PI / 2;
  
  model.traverse((child) => {
    if (child.isMesh) {
      totalTris += child.geometry.index ? child.geometry.index.count / 3 : 
                   child.geometry.attributes.position.count / 3;
      // Ensure vertex colors are used
      if (child.material) {
        child.material.vertexColors = true;
        child.material.side = THREE.DoubleSide;
        child.material.roughness = 0.8;
        child.material.metalness = 0.0;
      }
    }
  });
  
  modelGroup.add(model);
}

// ---- Events ----
function setupEvents() {
  const blocker = document.getElementById('blocker');
  const startBtn = document.getElementById('start-btn');
  
  startBtn.addEventListener('click', () => {
    controls.lock();
  });
  blocker.addEventListener('click', (e) => {
    if (e.target === blocker) controls.lock();
  });
  
  controls.addEventListener('lock', () => {
    blocker.classList.add('hidden');
  });
  controls.addEventListener('unlock', () => {
    blocker.classList.remove('hidden');
  });
  
  // Keyboard
  document.addEventListener('keydown', (e) => {
    switch(e.code) {
      case 'KeyW': case 'ArrowUp':    moveState.forward = true; break;
      case 'KeyS': case 'ArrowDown':  moveState.backward = true; break;
      case 'KeyA': case 'ArrowLeft':  moveState.left = true; break;
      case 'KeyD': case 'ArrowRight': moveState.right = true; break;
      case 'ShiftLeft': case 'ShiftRight': moveState.sprint = true; break;
      case 'Digit1': setViewMode('pc'); break;
      case 'Digit2': setViewMode('model'); break;
      case 'Digit3': setViewMode('both'); break;
    }
  });
  document.addEventListener('keyup', (e) => {
    switch(e.code) {
      case 'KeyW': case 'ArrowUp':    moveState.forward = false; break;
      case 'KeyS': case 'ArrowDown':  moveState.backward = false; break;
      case 'KeyA': case 'ArrowLeft':  moveState.left = false; break;
      case 'KeyD': case 'ArrowRight': moveState.right = false; break;
      case 'ShiftLeft': case 'ShiftRight': moveState.sprint = false; break;
    }
  });
  
  // Toggle buttons
  document.getElementById('btn-pc').addEventListener('click', () => setViewMode('pc'));
  document.getElementById('btn-model').addEventListener('click', () => setViewMode('model'));
  document.getElementById('btn-both').addEventListener('click', () => setViewMode('both'));
  
  // Touch controls
  const touchBtns = {
    'touch-fwd': 'forward', 'touch-back': 'backward',
    'touch-left': 'left', 'touch-right': 'right'
  };
  for (const [id, dir] of Object.entries(touchBtns)) {
    const btn = document.getElementById(id);
    if (btn) {
      btn.addEventListener('touchstart', (e) => { e.preventDefault(); moveState[dir] = true; });
      btn.addEventListener('touchend', (e) => { e.preventDefault(); moveState[dir] = false; });
    }
  }
  
  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ---- View mode toggle ----
function setViewMode(mode) {
  viewMode = mode;
  pointCloudGroup.visible = mode === 'pc' || mode === 'both';
  modelGroup.visible = mode === 'model' || mode === 'both';
  
  document.querySelectorAll('#toggle-bar button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode).classList.add('active');
  
  updateHUD();
}

// ---- HUD ----
function updateHUD() {
  const p = camera.position;
  document.getElementById('hud-pos').textContent = 
    `${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;
  document.getElementById('hud-pts').textContent = totalPoints.toLocaleString();
  document.getElementById('hud-tris').textContent = Math.round(totalTris).toLocaleString();
  document.getElementById('hud-mode').textContent = viewMode.toUpperCase();
}

// ---- Animation loop ----
function animate() {
  requestAnimationFrame(animate);
  
  const delta = Math.min(clock.getDelta(), 0.1);
  
  if (controls.isLocked) {
    const speed = moveState.sprint ? SPRINT_SPEED : WALK_SPEED;
    
    direction.z = Number(moveState.forward) - Number(moveState.backward);
    direction.x = Number(moveState.right) - Number(moveState.left);
    direction.normalize();
    
    velocity.x = direction.x * speed * delta;
    velocity.z = direction.z * speed * delta;
    
    controls.moveRight(velocity.x);
    controls.moveForward(velocity.z);
    
    // Keep height fixed (walk mode)
    // camera.position.y stays at initial height
  }
  
  // Update flashlight
  if (flashLight) {
    flashLight.position.copy(camera.position);
    const lookDir = new THREE.Vector3(0, 0, -1);
    lookDir.applyQuaternion(camera.quaternion);
    flashTarget.position.copy(camera.position).add(lookDir.multiplyScalar(5));
    flashLight.target = flashTarget;
  }
  
  // Update HUD periodically
  if (Math.random() < 0.05) updateHUD();
  
  renderer.render(scene, camera);
}

// ---- Point cloud coordinate fix ----
// The binary format stores points as (mcap_x, mcap_y, mcap_z)
// We need to re-read properly
function createPointCloudFixed(buffer) {
  const view = new DataView(buffer);
  const count = view.getUint32(0, true);
  totalPoints = count;
  
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  
  let offset = 4;
  const bytesPerPoint = 15; // 3*float32 + 3*uint8
  
  for (let i = 0; i < count; i++) {
    const baseOff = 4 + i * bytesPerPoint;
    const mcapX = view.getFloat32(baseOff, true);
    const mcapY = view.getFloat32(baseOff + 4, true);
    const mcapZ = view.getFloat32(baseOff + 8, true);
    
    // MCAP→Three.js: x=mcapX, y=mcapZ, z=-mcapY
    positions[i*3]     = mcapX;
    positions[i*3 + 1] = mcapZ;
    positions[i*3 + 2] = -mcapY;
    
    const r = view.getUint8(baseOff + 12) / 255;
    const g = view.getUint8(baseOff + 13) / 255;
    const b = view.getUint8(baseOff + 14) / 255;
    colors[i*3] = r;
    colors[i*3+1] = g;
    colors[i*3+2] = b;
  }
  
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  
  const mat = new THREE.PointsMaterial({
    size: 0.06,
    vertexColors: true,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.85,
  });
  
  const points = new THREE.Points(geom, mat);
  pointCloudGroup.add(points);
}

// Override the init to use fixed point cloud reader
async function main() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x06060c);
  scene.fog = new THREE.FogExp2(0x06060c, 0.04);

  camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.05, 100);

  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.body.appendChild(renderer.domElement);

  controls = new PointerLockControls(camera, document.body);

  // Lighting
  scene.add(new THREE.AmbientLight(0x334455, 0.4));
  scene.add(new THREE.HemisphereLight(0x8899aa, 0x222233, 0.3));

  flashTarget = new THREE.Object3D();
  scene.add(flashTarget);
  flashLight = new THREE.SpotLight(0xffe8cc, 3.0, 20, Math.PI * 0.4, 0.4, 1.5);
  scene.add(flashLight);

  modelGroup = new THREE.Group();
  pointCloudGroup = new THREE.Group();
  scene.add(modelGroup);
  scene.add(pointCloudGroup);

  setProgress(10, 'Loading trajectory...');

  // Load trajectory
  try {
    const resp = await fetch('assets/trajectory.json');
    trajData = await resp.json();
    createTrajectory(trajData);
  } catch(e) { console.warn('Trajectory load failed:', e); }

  setProgress(20, 'Loading point cloud...');

  // Load point cloud
  try {
    const pcResp = await fetch('assets/pointcloud.bin');
    const pcBuf = await pcResp.arrayBuffer();
    createPointCloudFixed(pcBuf);
  } catch(e) { console.warn('Point cloud load failed:', e); }

  setProgress(50, 'Loading 3D model...');

  // Load GLB
  try {
    const loader = new GLTFLoader();
    const gltf = await new Promise((resolve, reject) => {
      loader.load('assets/model.glb', resolve,
        (xhr) => { setProgress(50 + (xhr.loaded/xhr.total)*40, 'Loading 3D model...'); },
        reject);
    });
    processModel(gltf);
  } catch(e) { console.warn('Model load failed:', e); }

  setProgress(95, 'Finalizing...');

  // Camera start position
  if (trajData) {
    const s = trajData.start;
    camera.position.set(s[0], s[2] + 0.6, -s[1]);
  } else {
    camera.position.set(1.5, 0.9, 4.0);
  }

  setProgress(100, 'Ready!');
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('blocker').classList.remove('hidden');
  }, 400);

  setupEvents();
  updateHUD();
  animate();
}

main().catch(console.error);
</script>
</body>
</html>
