<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robodog 3D — LiDAR Space Reconstruction</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #06060c; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; color: #ccc; }
canvas { display: block; }

#blocker {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(6,6,12,0.92);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
#blocker.hidden { display: none; }

#splash {
  text-align: center; max-width: 520px; padding: 40px;
}
#splash h1 {
  font-size: 28px; color: #7ae8b4; margin-bottom: 8px; letter-spacing: 2px;
}
#splash .sub { color: #888; font-size: 13px; margin-bottom: 30px; }
#splash .start-btn {
  display: inline-block; padding: 14px 36px; border: 1px solid #7ae8b4;
  color: #7ae8b4; font-size: 15px; cursor: pointer; border-radius: 4px;
  transition: all 0.2s; letter-spacing: 1px;
}
#splash .start-btn:hover { background: #7ae8b4; color: #06060c; }
#splash .controls-hint {
  margin-top: 24px; color: #666; font-size: 11px; line-height: 1.8;
}
#splash .controls-hint kbd {
  background: #222; padding: 2px 7px; border-radius: 3px; border: 1px solid #444;
  font-size: 11px; color: #aaa;
}

#hud {
  position: fixed; top: 12px; left: 12px; z-index: 10;
  font-size: 11px; color: #556; pointer-events: none;
  line-height: 1.6;
}
#hud .val { color: #7ae8b4; }

#toggle-bar {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; gap: 6px;
}
#toggle-bar button {
  padding: 8px 16px; font-size: 12px; font-family: inherit;
  background: rgba(20,20,30,0.8); border: 1px solid #333; color: #888;
  border-radius: 4px; cursor: pointer; transition: all 0.2s;
  backdrop-filter: blur(8px);
}
#toggle-bar button.active { border-color: #7ae8b4; color: #7ae8b4; }
#toggle-bar button:hover { border-color: #7ae8b4; color: #bbb; }

#crosshair {
  position: fixed; top: 50%; left: 50%; z-index: 10;
  width: 16px; height: 16px; transform: translate(-50%, -50%);
  pointer-events: none; opacity: 0.3;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: #7ae8b4;
}
#crosshair::before { width: 1px; height: 16px; left: 7.5px; top: 0; }
#crosshair::after { width: 16px; height: 1px; top: 7.5px; left: 0; }

#loading {
  position: fixed; inset: 0; z-index: 200;
  background: #06060c; display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
#loading.hidden { display: none; }
#loading h2 { color: #7ae8b4; font-size: 16px; margin-bottom: 16px; }
#loading .bar { width: 200px; height: 3px; background: #1a1a2a; border-radius: 2px; overflow: hidden; }
#loading .bar-fill { height: 100%; background: #7ae8b4; width: 0%; transition: width 0.3s; }
#loading .status { color: #556; font-size: 11px; margin-top: 10px; }

#touch-controls {
  display: none; position: fixed; bottom: 80px; z-index: 10;
}
@media (pointer: coarse) {
  #touch-controls { display: flex; gap: 8px; left: 16px; }
  #touch-controls button {
    width: 52px; height: 52px; border-radius: 50%; border: 1px solid #444;
    background: rgba(20,20,30,0.7); color: #7ae8b4; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
}
</style>
</head>
<body>

<div id="loading">
  <h2>🐕 ROBODOG 3D</h2>
  <div class="bar"><div class="bar-fill" id="load-bar"></div></div>
  <div class="status" id="load-status">Initializing...</div>
</div>

<div id="blocker" class="hidden">
  <div id="splash">
    <h1>🐕 ROBODOG 3D</h1>
    <div class="sub">LiDAR-reconstructed indoor space from a Unitree Go2 robot dog</div>
    <div class="start-btn" id="start-btn">ENTER SPACE</div>
    <div class="controls-hint">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;
      <kbd>Mouse</kbd> Look &nbsp;
      <kbd>Shift</kbd> Sprint<br>
      <kbd>1</kbd> Point Cloud &nbsp;
      <kbd>2</kbd> Model &nbsp;
      <kbd>3</kbd> Both &nbsp;
      <kbd>ESC</kbd> Menu
    </div>
  </div>
</div>

<div id="crosshair"></div>

<div id="hud">
  <div>POS <span class="val" id="hud-pos">0, 0, 0</span></div>
  <div>PTS <span class="val" id="hud-pts">—</span> &nbsp; TRIS <span class="val" id="hud-tris">—</span></div>
  <div>VIEW <span class="val" id="hud-mode">BOTH</span></div>
</div>

<div id="toggle-bar">
  <button id="btn-pc" title="Point Cloud (1)">☁ Points</button>
  <button id="btn-model" title="Model (2)">🏠 Model</button>
  <button id="btn-both" class="active" title="Both (3)">⚡ Both</button>
</div>

<div id="touch-controls">
  <button id="touch-fwd">▲</button>
  <button id="touch-left">◄</button>
  <button id="touch-back">▼</button>
  <button id="touch-right">►</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

/* ─── state ─── */
let scene, camera, renderer, controls;
let modelGroup, pcGroup, flashLight, flashTarget;
const clock = new THREE.Clock();
let viewMode = 'both';
let totalPoints = 0, totalTris = 0;
let trajData = null;

const move = { fwd:false, back:false, left:false, right:false, sprint:false };
const WALK = 3.0, SPRINT = 8.0;
const vel = new THREE.Vector3();
const dir = new THREE.Vector3();

const $ = id => document.getElementById(id);
const setProgress = (p, m) => { $('load-bar').style.width = p+'%'; if(m) $('load-status').textContent = m; };

/* ─── main ─── */
async function main() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x06060c);
  scene.fog = new THREE.FogExp2(0x06060c, 0.035);

  camera = new THREE.PerspectiveCamera(80, innerWidth/innerHeight, 0.05, 100);

  renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.body.appendChild(renderer.domElement);

  controls = new PointerLockControls(camera, document.body);

  /* lighting */
  scene.add(new THREE.AmbientLight(0x334455, 0.4));
  scene.add(new THREE.HemisphereLight(0x8899aa, 0x222233, 0.3));
  flashTarget = new THREE.Object3D(); scene.add(flashTarget);
  flashLight = new THREE.SpotLight(0xffe8cc, 3, 20, Math.PI*0.4, 0.4, 1.5);
  scene.add(flashLight);

  modelGroup = new THREE.Group(); scene.add(modelGroup);
  pcGroup    = new THREE.Group(); scene.add(pcGroup);

  /* load assets */
  setProgress(5, 'Loading trajectory…');
  try { trajData = await (await fetch('assets/trajectory.json')).json(); buildTrajectory(); } catch(e){}
  setProgress(15, 'Loading point cloud…');
  try { buildPointCloud(await (await fetch('assets/pointcloud.bin')).arrayBuffer()); } catch(e){}
  setProgress(50, 'Loading 3D model…');
  try {
    const gltf = await new Promise((ok,err)=>{
      new GLTFLoader().load('assets/model.glb', ok,
        x=>{ setProgress(50+(x.loaded/x.total)*40, 'Loading 3D model…'); }, err);
    });
    buildModel(gltf);
  } catch(e){}

  /* camera start */
  if (trajData) { const s=trajData.start; camera.position.set(s[0], s[2]+0.6, -s[1]); }
  else camera.position.set(1.5, 0.9, 4.0);

  setProgress(100,'Ready!');
  setTimeout(()=>{ $('loading').classList.add('hidden'); $('blocker').classList.remove('hidden'); }, 300);

  events();
  updateHUD();
  tick();
}

/* ─── trajectory ─── */
function buildTrajectory() {
  const pts = trajData.points;
  const pos = new Float32Array(pts.length*3);
  for (let i=0;i<pts.length;i++) { pos[i*3]=pts[i][0]; pos[i*3+1]=pts[i][2]+0.05; pos[i*3+2]=-pts[i][1]; }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Line(g, new THREE.LineBasicMaterial({color:0x4488ff, transparent:true, opacity:0.45})));
}

/* ─── point cloud ─── */
function buildPointCloud(buf) {
  const v = new DataView(buf);
  const n = v.getUint32(0, true);
  totalPoints = n;
  const BPP = 15; // 3×f32 + 3×u8
  const pos = new Float32Array(n*3);
  const col = new Float32Array(n*3);
  for (let i=0;i<n;i++) {
    const o = 4 + i*BPP;
    const mx = v.getFloat32(o,    true);
    const my = v.getFloat32(o+4,  true);
    const mz = v.getFloat32(o+8,  true);
    pos[i*3]   = mx;
    pos[i*3+1] = mz;     // mcap Z → three Y (up)
    pos[i*3+2] = -my;    // mcap Y → -three Z
    col[i*3]   = v.getUint8(o+12)/255;
    col[i*3+1] = v.getUint8(o+13)/255;
    col[i*3+2] = v.getUint8(o+14)/255;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  pcGroup.add(new THREE.Points(g, new THREE.PointsMaterial({
    size:0.06, vertexColors:true, sizeAttenuation:true, transparent:true, opacity:0.85
  })));
}

/* ─── model ─── */
function buildModel(gltf) {
  const m = gltf.scene;
  m.rotation.x = -Math.PI/2;   // MCAP→Three.js coordinate swap
  m.traverse(c => {
    if (c.isMesh) {
      totalTris += c.geometry.index ? c.geometry.index.count/3 : c.geometry.attributes.position.count/3;
      if (c.material) { c.material.vertexColors=true; c.material.side=THREE.DoubleSide; c.material.roughness=0.8; c.material.metalness=0; }
    }
  });
  modelGroup.add(m);
}

/* ─── events ─── */
function events() {
  $('start-btn').onclick = ()=> controls.lock();
  $('blocker').onclick = e => { if(e.target===$('blocker')) controls.lock(); };
  controls.addEventListener('lock',   ()=> $('blocker').classList.add('hidden'));
  controls.addEventListener('unlock', ()=> $('blocker').classList.remove('hidden'));

  const km = { KeyW:'fwd',ArrowUp:'fwd', KeyS:'back',ArrowDown:'back',
               KeyA:'left',ArrowLeft:'left', KeyD:'right',ArrowRight:'right',
               ShiftLeft:'sprint',ShiftRight:'sprint' };
  addEventListener('keydown', e=>{
    if(km[e.code]) move[km[e.code]]=true;
    if(e.code==='Digit1') setView('pc');
    if(e.code==='Digit2') setView('model');
    if(e.code==='Digit3') setView('both');
  });
  addEventListener('keyup', e=>{ if(km[e.code]) move[km[e.code]]=false; });

  $('btn-pc').onclick    = ()=>setView('pc');
  $('btn-model').onclick = ()=>setView('model');
  $('btn-both').onclick  = ()=>setView('both');

  /* touch */
  for (const [id,d] of [['touch-fwd','fwd'],['touch-back','back'],['touch-left','left'],['touch-right','right']]) {
    const b=$(id); if(!b) continue;
    b.ontouchstart=e=>{e.preventDefault();move[d]=true;};
    b.ontouchend=e=>{e.preventDefault();move[d]=false;};
  }

  addEventListener('resize', ()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
}

/* ─── view toggle ─── */
function setView(m) {
  viewMode = m;
  pcGroup.visible    = m==='pc' || m==='both';
  modelGroup.visible = m==='model' || m==='both';
  document.querySelectorAll('#toggle-bar button').forEach(b=>b.classList.remove('active'));
  $('btn-'+m).classList.add('active');
  updateHUD();
}

/* ─── HUD ─── */
function updateHUD() {
  const p=camera.position;
  $('hud-pos').textContent  = `${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;
  $('hud-pts').textContent  = totalPoints.toLocaleString();
  $('hud-tris').textContent = Math.round(totalTris).toLocaleString();
  $('hud-mode').textContent = viewMode.toUpperCase();
}

/* ─── render loop ─── */
function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.1);

  if (controls.isLocked) {
    const spd = move.sprint ? SPRINT : WALK;
    dir.z = +move.fwd - +move.back;
    dir.x = +move.right - +move.left;
    dir.normalize();
    controls.moveRight(dir.x * spd * dt);
    controls.moveForward(dir.z * spd * dt);
  }

  /* flashlight follows camera */
  flashLight.position.copy(camera.position);
  const look = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  flashTarget.position.copy(camera.position).add(look.multiplyScalar(5));
  flashLight.target = flashTarget;

  if (Math.random()<0.05) updateHUD();
  renderer.render(scene, camera);
}

main().catch(console.error);
</script>
</body>
</html>
